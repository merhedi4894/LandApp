<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Record Search</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f4f4f4;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            width: 300px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>রেকর্ড সার্চ</h2>
    <form id="searchForm">
        <div class="form-group">
            <label for="name">Name:</label>
            <select id="name">
                <option value="">-- নাম নির্বাচন করুন --</option>
                <!-- জাভাস্ক্রিপ্ট দিয়ে ডাটা এখানে আসবে -->
            </select>
        </div>

        <div class="form-group">
            <label for="land">Land:</label>
            <select id="land">
                <option value="">-- জমির পরিমাণ --</option>
                <!-- জাভাস্ক্রিপ্ট দিয়ে ডাটা এখানে আসবে -->
            </select>
        </div>

        <div class="form-group">
            <label for="year">Year:</label>
            <select id="year">
                <option value="">-- সাল নির্বাচন করুন --</option>
                <!-- জাভাস্ক্রিপ্ট দিয়ে ডাটা এখানে আসবে -->
            </select>
        </div>

        <button type="submit">Search</button>
    </form>
</div>

<script>
    // ১. ডামি ডাটাবেস ডাটা (এখানে আপনার আসল ডাটা লোড হবে)
    const records = [
        { name: "Rahim", land: "52", year: "2024" },
        { name: "Mosto", land: "53", year: "2025" },
        { name: "Karim", land: "54", year: "2026" },
        { name: "Mosto", land: "53", year: "2025" } // ডুপ্লিকেট ডাটা
    ];

    // ২. ইউনিক ভ্যালু বের করার ফাংশন
    function populateDropdown(elementId, key) {
        const select = document.getElementById(elementId);
        
        // ডাটা থেকে নির্দিষ্ট ফিল্ডের ভ্যালু বের করা
        const values = records.map(item => item[key]);
        
        // ডুপ্লিকেট রিমুভ করা (Set ব্যবহার করে)
        const uniqueValues = [...new Set(values)];
        
        // সর্টিং (ছোট থেকে বড়)
        uniqueValues.sort((a, b) => {
            if (key === 'land' || key === 'year') return a - b; // সংখ্যার জন্য
            return a.localeCompare(b); // নামের জন্য
        });

        // ড্রপডাউনে অপশন যোগ করা
        uniqueValues.forEach(value => {
            const option = document.createElement('option');
            option.value = value;
            option.textContent = value;
            select.appendChild(option);
        });
    }

    // ৩. পেজ লোড হলে ড্রপডাউন ফিল করা
    document.addEventListener('DOMContentLoaded', () => {
        populateDropdown('name', 'name');
        populateDropdown('land', 'land');
        populateDropdown('year', 'year');
    });

    // সার্চ ফর্ম সাবমিট হ্যান্ডলার
    document.getElementById('searchForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const land = document.getElementById('land').value;
        const year = document.getElementById('year').value;
        
        console.log(`Searching: Name=${name}, Land=${land}, Year=${year}`);
        alert(`Searching: \nName: ${name}\nLand: ${land}\nYear: ${year}`);
    });
</script>

</body>
</html>
