<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ভূমি লিজ ব্যবস্থাপনা</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#1e3a5f', accent: '#0ea5e9' } } }
        }
    </script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%); min-height: 100vh; }
        .input-field { transition: all 0.2s; border: 2px solid #e2e8f0; }
        .input-field:focus { border-color: #0ea5e9; outline: none; box-shadow: 0 0 0 3px rgba(14, 165, 233, 0.15); }
        .btn { transition: all 0.2s; color: white; }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: linear-gradient(135deg, #1e3a5f, #2d5a87); }
        .btn-warning { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .btn-success { background: linear-gradient(135deg, #10b981, #059669); }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(5px); padding: 15px; }
        
        .dropdown-list { 
            position: absolute; 
            top: 100%; left: 0; right: 0; 
            background: white; border: 2px solid #0ea5e9; 
            max-height: 200px; overflow-y: auto; 
            z-index: 50; 
            border-radius: 0 0 8px 8px; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        
        .person-block { border-left: 4px solid #1e3a5f; padding-left: 15px; margin-bottom: 20px; }
        .person-name-header { font-size: 1.1rem; font-weight: 800; color: #1e3a5f; margin-bottom: 8px; border-bottom: 1px solid #e5e7eb; padding-bottom: 5px; }
        .status-line { margin-bottom: 4px; font-size: 0.95rem; }
    </style>
</head>
<body class="p-2 sm:p-4 md:p-6">

    <!-- LOGIN SECTION -->
    <div id="loginSection" class="max-w-md mx-auto">
        <div class="bg-white rounded-2xl shadow-xl p-6 sm:p-8 text-center">
            <h2 class="text-2xl font-bold text-primary mb-6">Login</h2>
            <form id="loginForm">
                <input type="text" id="username" value="mehedi4894" class="input-field w-full px-4 py-3 rounded-lg mb-4 bg-gray-100 font-semibold" required>
                <input type="password" id="password" placeholder="Password" class="input-field w-full px-4 py-3 rounded-lg mb-4" required>
                <div id="loginError" class="hidden text-red-500 text-sm mb-3"></div>
                <button class="btn btn-primary w-full py-3 rounded-lg font-semibold">Login</button>
            </form>
        </div>
    </div>

    <!-- MAIN APP SECTION -->
    <div id="appSection" class="hidden max-w-5xl mx-auto">
        
        <!-- Header -->
        <div class="bg-primary rounded-t-2xl p-4 text-white flex flex-col sm:flex-row justify-between items-center gap-3">
            <div class="text-center sm:text-left">
                <h1 class="text-xl font-bold">ভূমি লিজ ব্যবস্থাপনা</h1>
                <p class="text-sm font-semibold text-blue-200">মো: মেহেদী হাসান</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleLanguage()" id="langToggleBtn" class="btn bg-yellow-500 text-black px-4 py-2 rounded-lg text-sm font-bold">EN</button>
                <button onclick="openSettingsModal()" class="btn bg-white text-primary px-4 py-2 rounded-lg text-sm font-bold">Settings</button>
                <button onclick="logout()" class="btn bg-red-500/80 px-4 py-2 rounded-lg text-sm">Logout</button>
            </div>
        </div>
        
        <div class="bg-white rounded-b-2xl shadow-xl p-4 sm:p-6">
            
            <!-- ENTRY FORM -->
            <div class="border-b pb-6 mb-6">
                <h3 class="text-lg font-bold text-primary mb-4">New Entry</h3>
                <form id="landForm">
                    <div class="grid grid-cols-2 md:grid-cols-8 gap-4 items-end">
                        
                        <div class="relative col-span-2">
                            <label class="block text-xs font-semibold text-gray-600 mb-1">নাম</label>
                            <input type="text" id="newEntryNameInput" placeholder="Type or Select" class="input-field w-full px-3 py-2 rounded-lg text-sm bg-white" autocomplete="off" required>
                            <div id="newEntryNameDropdown" class="hidden dropdown-list"></div>
                        </div>

                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">জমি</label>
                            <select id="land" required onchange="updateDetailsByLand()" class="input-field w-full px-3 py-2 rounded-lg bg-white"><option value="">Select</option></select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">হারি গণনা</label>
                            <input type="text" id="hariBorshoDisplay" readonly class="input-field w-full px-3 py-2 rounded-lg bg-gray-100">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">হারি রেট</label>
                            <select id="rate" required class="input-field w-full px-3 py-2 rounded-lg bg-white"><option value="">Select</option></select>
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">টাকা</label>
                            <input type="number" id="tkGiven" class="input-field w-full px-3 py-2 rounded-lg">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-gray-600 mb-1">লিজ বর্ষ</label>
                            <input type="text" id="hariYear" class="input-field w-full px-3 py-2 rounded-lg bg-white">
                        </div>
                        <div>
                            <button type="submit" class="btn btn-primary w-full py-2.5 rounded-lg font-semibold text-sm">Save</button>
                        </div>
                    </div>
                    <div id="successMsg" class="hidden mt-3 text-green-600 text-sm text-center font-semibold">Saved!</div>
                </form>
            </div>

            <!-- SEARCH -->
            <div>
                <h3 class="text-lg font-bold text-primary mb-4">Search</h3>
                <div class="grid grid-cols-1 sm:grid-cols-4 gap-3 mb-3">
                    <div class="relative">
                        <input type="text" id="searchNameInput" placeholder="Name" class="input-field w-full px-3 py-2 rounded-lg bg-white" autocomplete="off">
                        <input type="hidden" id="searchName" value="ALL">
                        <div id="nameDropdown" class="hidden dropdown-list"></div>
                    </div>
                    <select id="searchLand" class="input-field px-3 py-2 rounded-lg bg-white"><option value="ALL">All Lands</option></select>
                    <select id="searchYear" class="input-field px-3 py-2 rounded-lg bg-white"><option value="ALL">All Years</option></select>
                    <div class="flex gap-2">
                        <button onclick="searchStatus()" class="btn btn-success px-4 rounded-lg flex-1">Status</button>
                        <button onclick="viewDatabase()" class="btn bg-purple-600 px-4 rounded-lg flex-1">Data</button>
                        <button onclick="deleteRecordsAction()" class="btn btn-danger px-4 rounded-lg">Del</button>
                    </div>
                </div>

                <!-- Result -->
                <div id="resultArea" class="hidden mt-4">
                    <div id="statusCard" class="hidden mb-4 p-4 bg-blue-50 border rounded-xl"></div>
                    <div id="databaseCard" class="hidden overflow-x-auto border rounded-lg">
                        <table class="w-full text-xs border-collapse">
                            <thead class="bg-gray-100"><tr>
                                <th class="p-2 border">Date</th><th class="p-2 border">Name</th><th class="p-2 border">Land</th>
                                <th class="p-2 border">Rate</th><th class="p-2 border">Total</th><th class="p-2 border">Given</th><th class="p-2 border">Year</th>
                            </tr></thead>
                            <tbody id="tableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal" class="hidden modal-overlay">
        <div class="bg-white rounded-2xl w-full max-w-3xl m-4 max-h-[90vh] flex flex-col">
            <div class="p-4 border-b bg-primary text-white rounded-t-2xl flex justify-between">
                <h3 class="font-bold">Settings: Profiles</h3>
                <button onclick="closeSettingsModal()" class="text-white text-2xl">&times;</button>
            </div>
            <div class="p-6 overflow-y-auto">
                <div class="grid grid-cols-2 md:grid-cols-5 gap-4 mb-6">
                    <input type="text" id="editName" placeholder="Name" class="input-field px-3 py-2 rounded-lg">
                    <input type="number" id="editLand" placeholder="Land" class="input-field px-3 py-2 rounded-lg">
                    <input type="text" id="editHariBorsho" placeholder="Hari Start" class="input-field px-3 py-2 rounded-lg">
                    <input type="number" id="editRate" placeholder="Rate" class="input-field px-3 py-2 rounded-lg">
                    <!-- Hidden Fields for Logic -->
                    <input type="hidden" id="oldName">
                    <input type="hidden" id="oldLand">
                    <input type="hidden" id="oldRate">
                    <input type="hidden" id="oldHariBorsho">
                    
                    <div class="flex gap-2">
                        <button onclick="saveProfileAction()" class="btn btn-primary px-4 rounded-lg flex-1">Save</button>
                    </div>
                </div>
                <h4 class="font-bold text-gray-700 mb-2">Saved Profiles</h4>
                <div class="overflow-x-auto border rounded-lg">
                    <table class="w-full text-sm border-collapse">
                        <thead class="bg-gray-100"><tr>
                            <th class="p-2 border text-left">Name</th><th class="p-2 border">Land</th>
                            <th class="p-2 border">Start</th><th class="p-2 border">Rate</th><th class="p-2 border">Action</th>
                        </tr></thead>
                        <tbody id="settingsTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- APP LOGIC ---
        let currentLang = 'bn';
        let currentUser = null;
        let userProfiles = []; 
        let allSearchNames = [];
        let searchLandMap = {};
        let searchYearMap = {}; 

        // --- API HELPER ---
        async function apiCall(url, data = {}) {
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await response.json();
            } catch (error) {
                console.error("API Error:", error);
                return { success: false, message: "Server Connection Error" };
            }
        }

        // --- LOGIN ---
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const res = await apiCall('/api/login', {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            });
            
            if (res.success) {
                currentUser = res.user;
                localStorage.setItem('landSession', JSON.stringify({ user: res.user.name }));
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('appSection').classList.remove('hidden');
                loadInitialData();
            } else {
                document.getElementById('loginError').classList.remove('hidden');
                document.getElementById('loginError').innerText = res.message;
            }
        });

        function logout() {
            localStorage.removeItem('landSession');
            document.getElementById('appSection').classList.add('hidden');
            document.getElementById('loginSection').classList.remove('hidden');
        }

        // --- INIT DATA (Core Logic) ---
        async function loadInitialData() {
            const data = await apiCall('/api/getInitData');
            
            // ১. গ্লোবাল প্রোফাইল ভ্যারিয়েবল আপডেট
            userProfiles = data.profiles || [];
            
            // ২. নতুন এন্ট্রি ফর্মের ড্রপডাউন আপডেট
            populateFormNames(userProfiles);
            
            // ৩. সার্চ অপশন আপডেট
            const options = data.searchOptions || {};
            allSearchNames = options.names || []; 
            searchLandMap = options.landMap || {};
            searchYearMap = options.yearMap || {};
            populateNameDropdown(allSearchNames);
            
            // ৪. সেটিংস মোডাল খোলা থাকলে টেবিল আপডেট করা (এটি মূল সমাধান)
            const modal = document.getElementById('settingsModal');
            if (modal && !modal.classList.contains('hidden')) {
                renderSettingsTable(userProfiles);
            }
        }

        // --- NEW ENTRY LOGIC ---
        function populateFormNames(profiles) {
            const distinctNames = [...new Set(profiles.map(p => p.name))];
            const dropdown = document.getElementById('newEntryNameDropdown');
            dropdown.innerHTML = '';
            if(distinctNames.length === 0) dropdown.innerHTML = `<div class="p-2 text-gray-400 italic">No Profiles</div>`;
            distinctNames.forEach(n => {
                dropdown.innerHTML += `<div class="p-2 cursor-pointer hover:bg-gray-100 border-b" onclick="selectNewEntryName('${n}')">${n}</div>`;
            });
        }

        function selectNewEntryName(name) {
            document.getElementById('newEntryNameInput').value = name;
            document.getElementById('newEntryNameDropdown').classList.add('hidden');
            updateLandRateDropdowns(name);
        }

        function updateLandRateDropdowns(name) {
            const matches = userProfiles.filter(p => p.name === name);
            const landSelect = document.getElementById('land');
            landSelect.innerHTML = `<option value="">Select</option>`;
            document.getElementById('rate').innerHTML = `<option value="">Select</option>`;
            document.getElementById('hariBorshoDisplay').value = "";
            
            if (matches.length > 0) {
                matches.forEach(p => landSelect.innerHTML += `<option value="${p.land}">${p.land}</option>`);
                if (matches.length === 1) {
                    landSelect.value = matches[0].land;
                    document.getElementById('rate').innerHTML = `<option value="${matches[0].rate}">${matches[0].rate}</option>`;
                    document.getElementById('rate').value = matches[0].rate;
                    document.getElementById('hariBorshoDisplay').value = matches[0].hariBorsho || "-";
                }
            }
        }

        function updateDetailsByLand() {
            const name = document.getElementById('newEntryNameInput').value;
            const land = document.getElementById('land').value;
            if (!name || !land) return;
            const profile = userProfiles.find(p => p.name === name && p.land == land);
            if (profile) {
                document.getElementById('rate').innerHTML = `<option value="${profile.rate}">${profile.rate}</option>`;
                document.getElementById('rate').value = profile.rate;
                document.getElementById('hariBorshoDisplay').value = profile.hariBorsho || "-";
            }
        }

        // --- SAVE FORM ---
        document.getElementById('landForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const name = document.getElementById('newEntryNameInput').value;
            const land = document.getElementById('land').value;
            const rate = document.getElementById('rate').value;
            
            if (!name || !land || !rate) return alert("Fill all fields");

            const formData = {
                name, land, rate,
                tkGiven: document.getElementById('tkGiven').value || 0,
                hariYear: document.getElementById('hariYear').value,
                loggedInUser: currentUser.name
            };

            const res = await apiCall('/api/saveFormData', formData);
            if(res.success) {
                document.getElementById('successMsg').classList.remove('hidden');
                this.reset();
                document.getElementById('newEntryNameInput').value = ''; 
                setTimeout(() => document.getElementById('successMsg').classList.add('hidden'), 2000);
                loadInitialData();
            } else { alert("Error saving"); }
        });

        // --- SEARCH LOGIC ---
        function populateNameDropdown(names) {
            const dropdown = document.getElementById('nameDropdown');
            dropdown.innerHTML = `<div class="p-2 cursor-pointer hover:bg-gray-100 font-bold text-blue-600" onclick="selectSearchName('ALL', 'All Names')">All Names</div>`;
            names.forEach(n => dropdown.innerHTML += `<div class="p-2 cursor-pointer hover:bg-gray-100" onclick="selectSearchName('${n}', '${n}')">${n}</div>`);
        }
        
        function selectSearchName(val, txt) {
            document.getElementById('searchName').value = val;
            document.getElementById('searchNameInput').value = txt;
            document.getElementById('nameDropdown').classList.add('hidden');
            
            const landSelect = document.getElementById('searchLand');
            landSelect.innerHTML = `<option value="ALL">All Lands</option>`;
            if (val !== "ALL" && searchLandMap[val]) searchLandMap[val].forEach(l => landSelect.innerHTML += `<option value="${l}">${l}</option>`);
            
            const yearSelect = document.getElementById('searchYear');
            yearSelect.innerHTML = `<option value="ALL">All Years</option>`;
            if (val !== "ALL" && searchYearMap[val]) searchYearMap[val].forEach(y => yearSelect.innerHTML += `<option value="${y}">${y}</option>`);
        }

        async function searchStatus() {
            const searchData = {
                name: document.getElementById('searchName').value,
                land: document.getElementById('searchLand').value,
                year: document.getElementById('searchYear').value
            };
            const data = await apiCall('/api/getReportData', searchData);
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('statusCard').classList.remove('hidden');
            document.getElementById('databaseCard').classList.add('hidden');
            
            if(data.records.length > 0) {
                let html = `<div class="text-left divide-y">`;
                const grouped = {};
                data.records.forEach(r => {
                    const key = r.name + "-" + (r.hariYear || r.year);
                    if(!grouped[key]) grouped[key] = { name: r.name, year: r.hariYear || r.year, total: 0, paid: 0 };
                    grouped[key].total += parseFloat(r.total);
                    grouped[key].paid += parseFloat(r.given);
                });
                for(let key in grouped) {
                    const g = grouped[key];
                    const due = g.total - g.paid;
                    const color = due > 0 ? 'text-red-600' : 'text-green-600';
                    html += `<div class="p-2"><b>${g.name}</b> (${g.year}) - Due: <span class="${color} font-bold">${due.toFixed(2)}</span></div>`;
                }
                html += `</div>`;
                document.getElementById('statusCard').innerHTML = html;
            } else {
                document.getElementById('statusCard').innerHTML = "<p class='text-center p-4'>No Data</p>";
            }
        }

        async function viewDatabase() {
             const searchData = {
                name: document.getElementById('searchName').value,
                land: document.getElementById('searchLand').value,
                year: document.getElementById('searchYear').value
            };
            const data = await apiCall('/api/getReportData', searchData);
            document.getElementById('resultArea').classList.remove('hidden');
            document.getElementById('statusCard').classList.add('hidden');
            document.getElementById('databaseCard').classList.remove('hidden');
            
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = '';
            data.records.forEach(r => {
                tbody.innerHTML += `<tr class="hover:bg-gray-50">
                    <td class="p-2 border">${r.date}</td><td class="p-2 border">${r.name}</td>
                    <td class="p-2 border text-center">${r.land}</td><td class="p-2 border text-center">${r.rate}</td>
                    <td class="p-2 border text-right">${r.total}</td><td class="p-2 border text-right">${r.given}</td>
                    <td class="p-2 border text-center">${r.hariYear || r.year}</td>
                </tr>`;
            });
        }

        async function deleteRecordsAction() {
            const name = document.getElementById('searchName').value;
            const year = document.getElementById('searchYear').value;
            if (name === "ALL" || year === "ALL") return alert("Select specific name and year");
            if(confirm("Delete data?")) {
                const res = await apiCall('/api/deleteRecords', { name, year });
                alert(res.message);
                document.getElementById('resultArea').classList.add('hidden');
            }
        }

        // --- SETTINGS LOGIC (Fixed) ---
        function openSettingsModal() { 
            document.getElementById('settingsModal').classList.remove('hidden'); 
            renderSettingsTable(userProfiles); // এখানে এসাইন করা ভ্যারিয়েবল দিয়ে টেবিল দেখাচ্ছে
        }
        function closeSettingsModal() { document.getElementById('settingsModal').classList.add('hidden'); }
        
        function renderSettingsTable(profiles) {
            const tbody = document.getElementById('settingsTableBody'); tbody.innerHTML = "";
            if(profiles.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-gray-400 p-4">No profiles found</td></tr>`;
            } else {
                profiles.forEach(p => {
                    tbody.innerHTML += `<tr class="border-b hover:bg-gray-50">
                        <td class="p-3 border font-semibold">${p.name}</td>
                        <td class="p-3 border text-center">${p.land}</td>
                        <td class="p-3 border text-center">${p.hariBorsho || "-"}</td>
                        <td class="p-3 border text-center">${p.rate}</td>
                        <td class="p-3 border text-center">
                            <button onclick="editProfileAction('${p.name}', '${p.land}', '${p.rate}', '${p.hariBorsho || ""}')" class="btn btn-warning px-2 py-1 rounded text-xs">Edit</button>
                            <button onclick="deleteProfileAction('${p.name}', '${p.land}', '${p.rate}')" class="btn btn-danger px-2 py-1 rounded text-xs ml-1">Del</button>
                        </td>
                    </tr>`;
                });
            }
        }
        
        function editProfileAction(name, land, rate, hariBorsho) {
            document.getElementById('editName').value = name; 
            document.getElementById('editLand').value = land; 
            document.getElementById('editRate').value = rate; 
            document.getElementById('editHariBorsho').value = hariBorsho;
            // Hidden fields
            document.getElementById('oldName').value = name; 
            document.getElementById('oldLand').value = land; 
            document.getElementById('oldRate').value = rate; 
            document.getElementById('oldHariBorsho').value = hariBorsho;
        }
        
        async function saveProfileAction() {
            const data = { 
                name: document.getElementById('editName').value, 
                land: document.getElementById('editLand').value, 
                rate: document.getElementById('editRate').value, 
                hariBorsho: document.getElementById('editHariBorsho').value, 
                oldName: document.getElementById('oldName').value, 
                oldLand: document.getElementById('oldLand').value, 
                oldRate: document.getElementById('oldRate').value
            };
            if(!data.name || !data.land || !data.rate) return alert("Fill Name, Land, Rate");
            
            const res = await apiCall('/api/saveProfile', data);
            if(res.success) {
                await loadInitialData(); // ডাটা লোড হওয়ার পর সেটিংস টেবিল নিজে নিজে আপডেট হবে
                alert("Profile Saved!");
            } else {
                alert("Error: " + res.message);
            }
        }
        
        async function deleteProfileAction(name, land, rate) {
            if(confirm("Delete profile?")) {
                await apiCall('/api/deleteProfile', { name, land, rate });
                await loadInitialData(); // রিফ্রেশ হবে
            }
        }

        // --- Event Listeners for Dropdowns ---
        document.getElementById('newEntryNameInput').addEventListener('focus', function() {
            document.getElementById('newEntryNameDropdown').classList.remove('hidden');
        });
        document.getElementById('searchNameInput').addEventListener('focus', function() {
            document.getElementById('nameDropdown').classList.remove('hidden');
        });
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#searchNameInput')) document.getElementById('nameDropdown').classList.add('hidden');
            if (!e.target.closest('#newEntryNameInput')) document.getElementById('newEntryNameDropdown').classList.add('hidden');
        });

        function toggleLanguage() {
            currentLang = currentLang === 'bn' ? 'en' : 'bn';
            document.getElementById('langToggleBtn').innerText = currentLang === 'bn' ? 'EN' : 'বাং';
        }

        // --- Check Session on Load ---
        if(localStorage.getItem('landSession')) {
            const session = JSON.parse(localStorage.getItem('landSession'));
            currentUser = { name: session.user };
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            loadInitialData();
        }
    </script>
</body>
</html>
